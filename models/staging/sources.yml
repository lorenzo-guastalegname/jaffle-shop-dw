version: 2

sources:
  - name: raw
    schema: raw
    description: Raw source tables from the operational ERP system
    tables:
      - name: orders
        description: Raw orders as they arrive from the source system
        columns:
          - name: order_id
            description: Unique order identifier
          - name: customer_id
            description: Foreign key to customers
          - name: order_date
            description: Date the order was placed
          - name: status
            description: "Order status: placed, shipped, completed, return_pending, returned"
          - name: amount
            description: Order total in EUR

      - name: customers
        description: Raw customer records
        columns:
          - name: customer_id
            description: Unique customer identifier
          - name: first_name
          - name: last_name
          - name: email

      - name: payments
        description: Raw payment transactions
        columns:
          - name: payment_id
          - name: order_id
          - name: payment_method
          - name: amount
