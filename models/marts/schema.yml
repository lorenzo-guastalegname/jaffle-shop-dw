version: 2

models:
  - name: customers
    description: "One row per customer with lifetime order and payment stats."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: number_of_orders
        tests:
          - not_null
      - name: lifetime_value
        tests:
          - not_null

  - name: orders
    description: "One row per order with customer details and payment info."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
