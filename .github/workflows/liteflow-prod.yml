name: "LiteFlow — PROD deploy"

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # manual trigger from GitHub Actions UI

# Triggered when the Release Manager merges both integration branches to main,
# OR manually via GitHub Actions → Run workflow.
#
# Required GitHub Environments (Settings → Environments):
#   production  — add required reviewers (Release Manager gate)

jobs:
  deploy-prod:
    name: "Deploy → prod (lf_prod)"
    runs-on: ubuntu-latest
    environment: production   # ← final approval gate before prod
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install LiteFlow + Databricks CLI
        run: |
          pip install git+https://github.com/lorenzo-guastalegname/liteflow.git sqlfluff
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Write profiles.yml
        run: |
          mkdir -p ~/.liteflow
          cat > ~/.liteflow/profiles.yml <<'PROFILEEOF'
          my_project:
            dev:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_DEV_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
            test:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_TEST_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
            devprj:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_DEVPRJ_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
            sit:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_SIT_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
            uat:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_UAT_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
            prod:
              adapter:   databricks
              host:      ${{ secrets.DATABRICKS_HOST }}
              http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
              catalog:   ${{ secrets.LF_PROD_CATALOG }}
              schema:    my_project
              token:     ${{ secrets.DATABRICKS_TOKEN }}
          PROFILEEOF
      - id: sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Strip UTF-8 BOM from SQL files
        run: |
          python3 -c "
          import glob
          for f in glob.glob('models/**/*.sql', recursive=True):
              d = open(f, 'rb').read()
              if d.startswith(b'\xef\xbb\xbf'):
                  open(f, 'wb').write(d[3:])
          "
      - run: liteflow lint
      - run: liteflow compile
      - run: liteflow run  --env prod
      - run: liteflow test --env prod
      - name: Tag deployment
        run: |
          git config user.email "liteflow-ci@github-actions"
          git config user.name  "LiteFlow CI"
          git tag -f "lf/prod/${{ steps.sha.outputs.sha }}"
          git push -f origin "lf/prod/${{ steps.sha.outputs.sha }}"
